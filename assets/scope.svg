<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 180" width="960" height="180" role="img" aria-label="Oscilloscope RS232 trace">
  <defs>
    
  </defs>
  <rect width="960" height="180" class="scope-bg"></rect>

  
  <g class="scope-grid">
    <line x1="0" y1="30" x2="960" y2="30"></line>
    <line x1="0" y1="60" x2="960" y2="60"></line>
    <line x1="0" y1="90" x2="960" y2="90"></line>
    <line x1="0" y1="120" x2="960" y2="120"></line>
    <line x1="0" y1="150" x2="960" y2="150"></line>
  </g>
  <g class="scope-grid" stroke-dasharray="2,4">
    <line x1="120" y1="0" x2="120" y2="180"></line>
    <line x1="240" y1="0" x2="240" y2="180"></line>
    <line x1="360" y1="0" x2="360" y2="180"></line>
    <line x1="480" y1="0" x2="480" y2="180"></line>
    <line x1="600" y1="0" x2="600" y2="180"></line>
    <line x1="720" y1="0" x2="720" y2="180"></line>
    <line x1="840" y1="0" x2="840" y2="180"></line>
  </g>

  
  <text class="scope-label" x="8" y="16">CH1  TTL 5V</text>
  <text class="scope-label" x="8" y="170">TIME  104µs/div   TRIG ↗ 2.5V   UART 9600 8N1</text>
  <text class="scope-label" x="860" y="16">RS-232</text>

  
  <g class="sweep">
    
    <path class="scope-trace" d="&#xA;      M 0 90&#xA;      L 20 90 L 20 45 L 60 45 L 60 90 L 80 90 L 80 45 L 100 45 L 100 90&#xA;      L 120 90 L 120 45 L 140 45 L 140 90 L 160 90 L 160 45 L 200 45 L 200 90&#xA;      L 220 90 L 220 45 L 260 45 L 260 90 L 280 90 L 280 45 L 320 45 L 320 90&#xA;      L 340 90 L 340 45 L 360 45 L 360 90 L 380 90 L 380 45 L 420 45 L 420 90&#xA;      L 440 90 L 440 45 L 460 45 L 460 90&#xA;      L 480 90 L 480 45 L 500 45 L 500 90 L 520 90 L 520 45 L 560 45 L 560 90&#xA;      L 580 90 L 580 45 L 620 45 L 620 90 L 640 90 L 640 45 L 680 45 L 680 90&#xA;      L 700 90 L 700 45 L 720 45 L 720 90 L 740 90 L 740 45 L 780 45 L 780 90&#xA;      L 800 90 L 800 45 L 820 45 L 820 90 L 840 90 L 840 45 L 880 45 L 880 90&#xA;      L 900 90 L 900 45 L 920 45 L 920 90&#xA;      L 960 90&#xA;    "></path>
    <path class="scope-trace" transform="translate(960,0)" d="&#xA;      M 0 90&#xA;      L 20 90 L 20 45 L 60 45 L 60 90 L 80 90 L 80 45 L 100 45 L 100 90&#xA;      L 120 90 L 120 45 L 140 45 L 140 90 L 160 90 L 160 45 L 200 45 L 200 90&#xA;      L 220 90 L 220 45 L 260 45 L 260 90 L 280 90 L 280 45 L 320 45 L 320 90&#xA;      L 340 90 L 340 45 L 360 45 L 360 90 L 380 90 L 380 45 L 420 45 L 420 90&#xA;      L 440 90 L 440 45 L 460 45 L 460 90&#xA;      L 480 90 L 480 45 L 500 45 L 500 90 L 520 90 L 520 45 L 560 45 L 560 90&#xA;      L 580 90 L 580 45 L 620 45 L 620 90 L 640 90 L 640 45 L 680 45 L 680 90&#xA;      L 700 90 L 700 45 L 720 45 L 720 90 L 740 90 L 740 45 L 780 45 L 780 90&#xA;      L 800 90 L 800 45 L 820 45 L 820 90 L 840 90 L 840 45 L 880 45 L 880 90&#xA;      L 900 90 L 900 45 L 920 45 L 920 90&#xA;      L 960 90&#xA;    "></path>
  </g>

  
  <g class="scope-ink" font-size="11">
    <text x="20" y="140">l</text>
    <text x="140" y="140">o</text>
    <text x="260" y="140">r</text>
    <text x="380" y="140">d</text>
    <text x="500" y="140">w</text>
    <text x="620" y="140">a</text>
    <text x="740" y="140">r</text>
    <text x="860" y="140">e</text>
  </g>

  
  <g transform="translate(910,8)">
    <circle cx="6" cy="6" r="4" fill="#FF5C3A" class="rec"></circle>
    <text x="16" y="10" class="scope-label" fill="#FF5C3A">REC</text>
  </g>
</svg>