<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 90" width="960" height="90" role="img" aria-label="lordware live ticker">
  <defs>
    <style>
      .t-bg      { fill: #1A1814; }
      .t-subbg   { fill: #2A251E; }
      .t-border  { fill: none; stroke: #3A352C; stroke-width: 1; }
      .t-label   { font-family: 'IBM Plex Mono', Menlo, Consolas, monospace; font-size: 13px; font-weight: 700; fill: #E8DCC4; }
      .t-sub     { font-family: 'IBM Plex Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #A89968; }
      .t-tx      { font-family: 'IBM Plex Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #4FD97F; }
      .t-cursor  { font-family: 'IBM Plex Mono', Menlo, Consolas, monospace; font-size: 14px; fill: #E8DCC4; }
      .t-tag     { font-family: 'IBM Plex Mono', Menlo, Consolas, monospace; font-size: 14px; font-weight: 700; }
      .t-msg     { font-family: 'IBM Plex Mono', Menlo, Consolas, monospace; font-size: 14px; fill: #E8DCC4; }
      .t-sep     { font-family: 'IBM Plex Mono', Menlo, Consolas, monospace; font-size: 14px; fill: #3A352C; }
    </style>
    <clipPath id="t-clip">
      <rect x="0" y="22" width="960" height="68"/>
    </clipPath>
  </defs>

  <rect class="t-bg" width="960" height="90"/>
  <rect class="t-subbg" width="960" height="22"/>
  <rect class="t-border" x="0.5" y="0.5" width="959" height="89"/>
  <line x1="0" y1="22" x2="960" y2="22" stroke="#3A352C" stroke-width="1"/>

  <!-- top bar -->
  <text class="t-label" x="12" y="15">NOW:</text>
  <text class="t-sub" x="56" y="15">/proc/lordware · live</text>
  <text class="t-tx" x="840" y="15">tx 122s loop</text>
  <text class="t-cursor" x="942" y="17">&#9612;<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></text>

  <!-- marquee: two copies of the strip, outer group translates left -->
  <g clip-path="url(#t-clip)">
    <g>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-4912 0" dur="122s" repeatCount="indefinite"/>
      <g>
      <text x="0" y="62" class="t-tag" fill="#FF5C3A">[shipping]</text>
      <text x="92" y="62" class="t-msg">motor controller firmware · CANopen DS402 profile</text>
      <text x="490" y="62" class="t-sep">·</text>
      <text x="512" y="62" class="t-tag" fill="#4FC3FF">[reading]</text>
      <text x="596" y="62" class="t-msg">Making Embedded Systems, E. White · MISRA C:2012</text>
      <text x="986" y="62" class="t-sep">·</text>
      <text x="1008" y="62" class="t-tag" fill="#4FD97F">[learning]</text>
      <text x="1100" y="62" class="t-msg">deterministic scheduling with rate-monotonic analysis</text>
      <text x="1530" y="62" class="t-sep">·</text>
      <text x="1552" y="62" class="t-tag" fill="#FFB83D">[tinkering]</text>
      <text x="1652" y="62" class="t-msg">ESP32 &lt;-&gt; legacy RS232 plotter bridge</text>
      <text x="1954" y="62" class="t-sep">·</text>
      <text x="1976" y="62" class="t-tag" fill="#FFB83D">[tinkering]</text>
      <text x="2076" y="62" class="t-msg">a pocket-sized J1939 sniffer on a CH32V</text>
      <text x="2394" y="62" class="t-sep">·</text>
      <text x="2416" y="62" class="t-tag" fill="#4FC3FF">[reading]</text>
      <text x="2500" y="62" class="t-msg">Programming Embedded Systems, M. Barr · SEI CERT C</text>
      <text x="2906" y="62" class="t-sep">·</text>
      <text x="2928" y="62" class="t-tag" fill="#4FD97F">[learning]</text>
      <text x="3020" y="62" class="t-msg">lock-free ring buffers on AVR (yes, really)</text>
      <text x="3370" y="62" class="t-sep">·</text>
      <text x="3392" y="62" class="t-tag" fill="#B77FFF">[dreaming]</text>
      <text x="3484" y="62" class="t-msg">an open-source replacement for the AD2 logic analyzer</text>
      <text x="3914" y="62" class="t-sep">·</text>
      <text x="3936" y="62" class="t-tag" fill="#FF5C3A">[shipping]</text>
      <text x="4028" y="62" class="t-msg">BLDC commutation tuner for hobby drones</text>
      <text x="4346" y="62" class="t-sep">·</text>
      <text x="4368" y="62" class="t-tag" fill="#B77FFF">[dreaming]</text>
      <text x="4460" y="62" class="t-msg">a homemade logic analyzer that fits in an Altoids tin</text>
      <text x="4890" y="62" class="t-sep">·</text>
      </g>
      <g transform="translate(4912 0)">
